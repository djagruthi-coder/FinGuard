<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinGuard – Profile</title>
  <meta name="description" content="View and update your FinGuard profile information." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">Fin<span>Guard</span></div>
    </div>

    <span class="nav-section-label">Overview</span>
    <a href="dashboard.html" class="nav-link">
      <span class="nav-icon">📊</span> Dashboard
    </a>
    <a href="transactions.html" class="nav-link">
      <span class="nav-icon">💳</span> Transactions
      <span class="nav-badge">3</span>
    </a>

    <span class="nav-section-label">Payments</span>
    <a href="payments.html" class="nav-link">
      <span class="nav-icon">📲</span> Payments & Bills
    </a>
    <a href="rewards.html" class="nav-link">
      <span class="nav-icon">🎁</span> Rewards
    </a>

    <span class="nav-section-label">Other</span>
    <a href="travel.html" class="nav-link">
      <span class="nav-icon">✈️</span> Travel & Booking
    </a>
    <a href="vault.html" class="nav-link">
      <span class="nav-icon">🔐</span> Asset Vault
    </a>
    <a href="profile.html" class="nav-link active">
      <span class="nav-icon">👤</span> Profile
    </a>

    <span class="nav-section-label">Support</span>
    <a href="#" class="nav-link" onclick="toggleChat(); return false;">
      <span class="nav-icon">🤖</span> AI Assistant
    </a>
    <a href="index.html" class="nav-link">
      <span class="nav-icon">🏠</span> Home
    </a>

    <div class="sidebar-bottom">
      <div class="nav-link">
        <div class="user-avatar">--</div>
        <div>
          <div style="font-size:0.8rem;font-weight:600">Guest</div>
          <div style="font-size:0.7rem;color:var(--text-muted)">Active</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>My Profile</h1>
      <p>Manage your FinGuard profile and saved account info.</p>
    </div>

    <div class="glass-card" style="max-width:520px; margin:0 auto; padding:28px">
      <h2 style="margin-bottom:18px">Personal details</h2>
      <div style="display:grid;gap:16px">
        <label style="font-weight:600;color:var(--text-secondary)">Full name</label>
        <input id="profile-name" type="text" placeholder="Your name" style="padding:12px 14px;border-radius:14px;border:1px solid rgba(148,163,184,0.4);background:rgba(243,244,246,0.9);" />

        <label style="font-weight:600;color:var(--text-secondary)">Phone number</label>
        <input id="profile-phone" type="tel" placeholder="10-digit mobile" style="padding:12px 14px;border-radius:14px;border:1px solid rgba(148,163,184,0.4);background:rgba(243,244,246,0.9);" />

        <label style="font-weight:600;color:var(--text-secondary)">Bank account number</label>
        <input id="profile-bank" type="text" placeholder="Bank account number" style="padding:12px 14px;border-radius:14px;border:1px solid rgba(148,163,184,0.4);background:rgba(243,244,246,0.9);" />

        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
          <button id="save-profile" class="btn btn-primary" style="flex:1;">Save changes</button>
          <button id="logout" class="btn btn-secondary" style="flex:1;">Logout</button>
        </div>

        <div id="profile-message" style="font-size:0.9rem;color:var(--text-muted);min-height:1.2rem"></div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script src="profile.js"></script>
  <script src="chatbot.js"></script>
</body>
</html>
